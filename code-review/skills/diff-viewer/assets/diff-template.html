<!DOCTYPE html>
<html lang="en" data-diff-view="unified" data-page-theme="light" data-code-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__REPORT_TITLE__</title>
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface-muted: #f0f2f4;
      --border: #d8dde3;
      --text: #1f2933;
      --muted: #667085;
      --accent: #2563eb;
      --add-bg: #e8f6ee;
      --add-line: #c6ead3;
      --add-text: #116329;
      --del-bg: #fdebec;
      --del-line: #f6c7ca;
      --del-text: #a40e26;
      --hunk-bg: #eef3ff;
      --hunk-text: #3150a8;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
    }

    html[data-page-theme="dark"] {
      --bg: #111318;
      --surface: #181b21;
      --surface-muted: #20242c;
      --border: #323846;
      --text: #e6e9ef;
      --muted: #9aa4b2;
      --accent: #7aa2ff;
      --add-bg: #12321f;
      --add-line: #1e5433;
      --add-text: #8fe3a7;
      --del-bg: #3b151a;
      --del-line: #64252d;
      --del-text: #ffb3ba;
      --hunk-bg: #1d2946;
      --hunk-text: #a9c2ff;
      --shadow: none;
    }

    html[data-code-theme="light"] {
      --code-bg: #ffffff;
      --code-fg: #1f2328;
      --code-muted: #8c959f;
    }

    html[data-code-theme="dark"] {
      --code-bg: #0d1117;
      --code-fg: #c9d1d9;
      --code-muted: #6e7681;
    }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.45;
    }

    a { color: inherit; text-decoration: none; }

    .layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid var(--border);
      background: var(--surface-muted);
      padding: 22px 16px;
    }

    .brand {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .repo {
      overflow-wrap: anywhere;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      margin-bottom: 18px;
    }

    .nav-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-list a {
      display: block;
      border-radius: 6px;
      color: var(--muted);
      padding: 7px 8px;
      overflow-wrap: anywhere;
    }

    .nav-list a:hover { background: var(--border); color: var(--text); }

    .nav-list a.active {
      background: var(--accent);
      color: #ffffff;
      font-weight: 500;
    }

    .nav-list a.active:hover { background: var(--accent); color: #ffffff; }

    main {
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.2;
    }

    .meta { color: var(--muted); }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 24px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 112px;
      padding: 10px 12px;
    }

    .metric strong {
      display: block;
      font-size: 19px;
      line-height: 1.1;
    }

    .metric span { color: var(--muted); font-size: 12px; }
    .metric.add strong { color: var(--add-text); }
    .metric.del strong { color: var(--del-text); }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px;
      box-shadow: var(--shadow);
    }

    .control-label {
      color: var(--muted);
      font-size: 12px;
      padding-left: 5px;
    }

    button, select {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      min-height: 28px;
      padding: 4px 8px;
    }

    button[aria-pressed="true"] {
      background: var(--accent);
      color: #ffffff;
    }

    select { border-left: 1px solid var(--border); }

    .file-diff {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      overflow: hidden;
    }

    .file-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
    }

    .file-header h2 {
      margin: 0 0 2px;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .file-header p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .language-badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .diff-view { overflow: auto; }
    html[data-diff-view="unified"] .split-view { display: none; }
    html[data-diff-view="split"] .unified-view { display: none; }

    .diff-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.55;
    }

    .line-col { width: 54px; }
    .divider-col { width: 10px; }

    .line-no {
      background: var(--surface-muted);
      border-right: 1px solid var(--border);
      color: var(--code-muted);
      padding: 0 8px;
      text-align: right;
      user-select: none;
      vertical-align: top;
      position: relative;
    }

    .add-comment-btn {
      position: absolute;
      top: 50%;
      left: 1px;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #ffffff;
      border: 0;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      padding: 0;
      display: none;
      box-shadow: var(--shadow);
      z-index: 1;
    }

    .diff-table tr:hover > .line-no .add-comment-btn { display: inline-flex; }
    .add-comment-btn:hover { opacity: 0.9; }

    .code-line {
      background: var(--code-bg);
      color: var(--code-fg);
      overflow-wrap: anywhere;
      padding: 0 10px;
      white-space: pre-wrap;
      vertical-align: top;
    }

    .code-line code {
      background: transparent;
      color: inherit;
      font-family: inherit;
      padding: 0;
      white-space: pre-wrap;
    }

    .line-sign {
      display: inline-block;
      color: var(--muted);
      user-select: none;
      width: 18px;
    }

    .line-add .line-no { background: var(--add-line); color: var(--add-text); }
    .line-add .code-line { background: var(--add-bg); }
    .line-del .line-no { background: var(--del-line); color: var(--del-text); }
    .line-del .code-line { background: var(--del-bg); }

    .hunk-row td {
      background: var(--hunk-bg);
      color: var(--hunk-text);
      font-weight: 600;
      padding: 5px 10px;
    }

    .split-divider { background: var(--border); padding: 0; }
    .empty { background: var(--surface-muted); }

    .empty-state {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    /* Inline review comments */
    .comment-row > td,
    .comment-input-row > td {
      background: var(--surface-muted);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      white-space: normal;
    }

    .comment-thread { display: flex; flex-direction: column; gap: 8px; }

    .comment {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comment-meta { color: var(--muted); font-size: 11px; }
    .comment-body { white-space: pre-wrap; word-break: break-word; }

    .comment-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .comment-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .comment-input-meta { color: var(--muted); font-size: 11px; }

    .comment-input textarea {
      width: 100%;
      min-height: 64px;
      resize: vertical;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.45;
      box-sizing: border-box;
    }

    .comment-input-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .btn-comment {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-sans);
      line-height: 1.4;
    }

    .btn-comment.btn-save {
      background: var(--accent);
      color: #ffffff;
      border: 1px solid var(--accent);
    }

    .btn-comment.btn-cancel,
    .btn-comment.btn-delete {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-comment.btn-delete:hover { color: var(--del-text); border-color: var(--del-line); }
    .btn-comment.btn-save:hover { opacity: 0.9; }

    /* Floating Copy Markdown button */
    .floating-copy-md {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1000;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #ffffff;
      border: 0;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(16, 24, 40, 0.18);
    }

    .floating-copy-md:hover { opacity: 0.92; }
    .floating-copy-md.copied { background: var(--add-text); }
    .floating-copy-md .count {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
    }

    @media (max-width: 860px) {
      .layout { display: block; }
      aside { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--border); }
      main { padding: 18px; }
      .topbar { display: block; }
      .controls { justify-content: flex-start; margin-top: 14px; }
      .diff-table { font-size: 11px; }
      .line-col { width: 42px; }
    }
  </style>
</head>
<body>
  <button class="floating-copy-md" type="button" data-copy-markdown aria-label="Copy review markdown">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
    <span class="label">Copy Markdown</span>
    <span class="count" data-comment-count hidden>0</span>
  </button>
  <div class="layout">
    <aside>
      <div class="brand">Diff Viewer</div>
      <div class="repo">__REPO_PATH__</div>
      <nav aria-label="Changed files">
        <ul class="nav-list">
          __FILE_NAV__
        </ul>
      </nav>
    </aside>

    <main id="top">
      <div class="topbar">
        <div>
          <h1>__REPORT_TITLE__</h1>
          <div class="meta">Generated __CREATED_AT__</div>
        </div>
        <div class="controls" aria-label="Display controls">
          <div class="control" role="group" aria-label="Diff view">
            <span class="control-label">View</span>
            <button type="button" data-set-view="unified">Unified</button>
            <button type="button" data-set-view="split">Split</button>
          </div>
          <label class="control">
            <span class="control-label">Page</span>
            <select data-theme-select>
              <option value="auto">Auto</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
          <label class="control">
            <span class="control-label">Code</span>
            <select data-code-theme-select>
              <option value="auto">Auto</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
        </div>
      </div>

      <div class="summary" aria-label="Diff summary">
        <div class="metric"><strong>__SUMMARY_FILES__</strong><span>files changed</span></div>
        <div class="metric add"><strong>+__SUMMARY_ADDITIONS__</strong><span>additions</span></div>
        <div class="metric del"><strong>-__SUMMARY_DELETIONS__</strong><span>deletions</span></div>
      </div>

      __REPORT_BODY__
    </main>
  </div>

  <script id="highlight-seeds" type="application/json">__HIGHLIGHT_SEEDS__</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script>
    const defaults = {
      view: __DEFAULT_VIEW__,
      theme: __DEFAULT_THEME__,
      codeTheme: __DEFAULT_CODE_THEME__
    };
    const themeUrls = {
      light: "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css",
      dark: "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
    };
    const media = window.matchMedia("(prefers-color-scheme: dark)");

    function preferred(value) {
      return value === "auto" ? (media.matches ? "dark" : "light") : value;
    }

    function setView(view) {
      document.documentElement.dataset.diffView = view;
      localStorage.setItem("diff-viewer:view", view);
      document.querySelectorAll("[data-set-view]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.setView === view));
      });
    }

    function setTheme(value) {
      document.documentElement.dataset.pageTheme = preferred(value);
      localStorage.setItem("diff-viewer:theme", value);
      document.querySelector("[data-theme-select]").value = value;
    }

    function setCodeTheme(value) {
      const resolved = preferred(value);
      document.documentElement.dataset.codeTheme = resolved;
      document.getElementById("hljs-theme").href = themeUrls[resolved];
      localStorage.setItem("diff-viewer:code-theme", value);
      document.querySelector("[data-code-theme-select]").value = value;
    }

    document.querySelectorAll("[data-set-view]").forEach((button) => {
      button.addEventListener("click", () => setView(button.dataset.setView));
    });
    document.querySelector("[data-theme-select]").addEventListener("change", (event) => {
      setTheme(event.target.value);
    });
    document.querySelector("[data-code-theme-select]").addEventListener("change", (event) => {
      setCodeTheme(event.target.value);
    });
    media.addEventListener("change", () => {
      setTheme(localStorage.getItem("diff-viewer:theme") || defaults.theme);
      setCodeTheme(localStorage.getItem("diff-viewer:code-theme") || defaults.codeTheme);
    });

    setView(localStorage.getItem("diff-viewer:view") || defaults.view);
    setTheme(localStorage.getItem("diff-viewer:theme") || defaults.theme);
    setCodeTheme(localStorage.getItem("diff-viewer:code-theme") || defaults.codeTheme);

    function splitHighlightedHtml(markup) {
      const lines = [""];
      const openTags = [];
      let index = 0;

      while (index < markup.length) {
        if (markup.startsWith("<span ", index)) {
          const end = markup.indexOf(">", index);
          const tag = markup.slice(index, end + 1);
          lines[lines.length - 1] += tag;
          openTags.push(tag);
          index = end + 1;
        } else if (markup.startsWith("</span>", index)) {
          lines[lines.length - 1] += "</span>";
          openTags.pop();
          index += 7;
        } else if (markup[index] === "\n") {
          for (let i = openTags.length - 1; i >= 0; i -= 1) {
            lines[lines.length - 1] += "</span>";
          }
          lines.push(openTags.join(""));
          index += 1;
        } else {
          lines[lines.length - 1] += markup[index];
          index += 1;
        }
      }

      return lines;
    }

    function highlightedLines(text, language) {
      if (!window.hljs) return text.split("\n").map((line) => line || "&nbsp;");
      const highlighted = language && hljs.getLanguage(language)
        ? hljs.highlight(text, { language, ignoreIllegals: true }).value
        : hljs.highlightAuto(text).value;
      return splitHighlightedHtml(highlighted);
    }

    const seedElement = document.getElementById("highlight-seeds");
    if (seedElement) {
      const files = new Map();
      JSON.parse(seedElement.textContent || "[]").forEach((seed) => {
        files.set(String(seed.file), {
          before: highlightedLines(seed.before || "", seed.lang),
          after: highlightedLines(seed.after || "", seed.lang)
        });
      });

      document.querySelectorAll("[data-highlight-file]").forEach((node) => {
        const file = files.get(node.dataset.highlightFile);
        if (!file) return;
        const side = file[node.dataset.highlightSide];
        const line = side && side[Number(node.dataset.highlightLine)];
        if (line !== undefined) node.innerHTML = line || "&nbsp;";
      });
    }

    // File nav scroll spy — highlight the file currently in view
    (function () {
      const sections = Array.from(document.querySelectorAll("section.file-diff"));
      const links = Array.from(document.querySelectorAll(".nav-list a[href^='#']"));
      if (!sections.length || !links.length) return;

      const linkByAnchor = new Map();
      links.forEach((link) => {
        const id = link.getAttribute("href").slice(1);
        if (id) linkByAnchor.set(id, link);
      });

      const aside = document.querySelector("aside");
      const offset = 96; // px below viewport top considered "current"
      let activeLink = null;

      function ensureVisible(link) {
        if (!aside) return;
        const r = link.getBoundingClientRect();
        const ar = aside.getBoundingClientRect();
        if (r.top < ar.top || r.bottom > ar.bottom) {
          link.scrollIntoView({ block: "nearest" });
        }
      }

      function updateActive() {
        let current = sections[0];
        for (let i = 0; i < sections.length; i++) {
          if (sections[i].getBoundingClientRect().top - offset <= 0) {
            current = sections[i];
          } else {
            break;
          }
        }
        const link = linkByAnchor.get(current.id);
        if (link === activeLink) return;
        if (activeLink) activeLink.classList.remove("active");
        if (link) {
          link.classList.add("active");
          ensureVisible(link);
        }
        activeLink = link || null;
      }

      window.addEventListener("scroll", updateActive, { passive: true });
      window.addEventListener("resize", updateActive);
      updateActive();
    })();

    // Inline review comments — hover line number → "+" → textarea → save → localStorage
    (function () {
      const repoEl = document.querySelector(".repo");
      const repoPath = repoEl ? repoEl.textContent.trim() : "";
      const STORAGE_KEY = "diff-viewer:comments:" + (repoPath || "default");

      const EXT_LANG = {
        js: "js", mjs: "js", cjs: "js", jsx: "jsx",
        ts: "ts", tsx: "tsx", py: "python", go: "go",
        rs: "rust", java: "java", kt: "kotlin", rb: "ruby",
        php: "php", c: "c", h: "c", cpp: "cpp", cc: "cpp",
        cs: "csharp", swift: "swift", scala: "scala",
        sh: "bash", bash: "bash", zsh: "bash",
        html: "html", htm: "html", xml: "xml",
        css: "css", scss: "scss", less: "less",
        json: "json", jsonc: "json", yaml: "yaml", yml: "yaml",
        toml: "toml", md: "markdown", sql: "sql", lua: "lua",
        vue: "vue", svelte: "svelte"
      };

      function loadComments() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) { return []; }
      }

      function saveComments(list) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
        catch (e) { /* ignore quota errors */ }
      }

      function genId() {
        return "c-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
      }

      function getFilePath(section) {
        const h2 = section.querySelector(".file-header h2");
        if (!h2) return "";
        const txt = h2.textContent.trim();
        const m = txt.match(/^(.+?)\s*->\s*(.+)$/);
        return m ? m[2].trim() : txt;
      }

      function readCellCode(cell) {
        if (!cell) return "";
        const codeEl = cell.querySelector("code");
        const raw = (codeEl ? codeEl.textContent : cell.textContent) || "";
        // Drop the leading line-sign character if it sneaks in via textContent
        return raw;
      }

      function annotateCell(cell, file, side, codeCell) {
        if (!cell.classList.contains("line-no")) return;
        const text = (cell.textContent || "").trim();
        if (!text) return;
        const lineNum = parseInt(text, 10);
        if (!Number.isFinite(lineNum)) return;

        cell.dataset.file = file;
        cell.dataset.line = String(lineNum);
        cell.dataset.side = side;
        cell.dataset.code = readCellCode(codeCell);

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "add-comment-btn";
        btn.textContent = "+";
        btn.title = "Add comment";
        cell.appendChild(btn);
      }

      function annotateLines() {
        document.querySelectorAll("section.file-diff").forEach((section) => {
          const file = getFilePath(section);
          section.querySelectorAll(".unified-table > tbody > tr").forEach((tr) => {
            if (tr.classList.contains("hunk-row")) return;
            const cells = tr.children;
            if (cells.length < 3) return;
            annotateCell(cells[0], file, "old", cells[2]);
            annotateCell(cells[1], file, "new", cells[2]);
          });
          section.querySelectorAll(".split-table > tbody > tr").forEach((tr) => {
            if (tr.classList.contains("hunk-row")) return;
            const cells = tr.children;
            if (cells.length < 5) return;
            annotateCell(cells[0], file, "old", cells[1]);
            annotateCell(cells[3], file, "new", cells[4]);
          });
        });
      }

      let activeInputRow = null;

      function closeInput() {
        if (activeInputRow) { activeInputRow.remove(); activeInputRow = null; }
      }

      function openInput(originRow, file, line, side, code) {
        closeInput();
        const tr = document.createElement("tr");
        tr.className = "comment-input-row";
        const td = document.createElement("td");
        td.colSpan = originRow.children.length;

        const wrap = document.createElement("div");
        wrap.className = "comment-input";

        const meta = document.createElement("div");
        meta.className = "comment-input-meta";
        meta.textContent = file + " · Line " + line + " (" + side + ")";

        const ta = document.createElement("textarea");
        ta.placeholder = "Write a review comment…";

        const actions = document.createElement("div");
        actions.className = "comment-input-actions";

        const cancel = document.createElement("button");
        cancel.type = "button";
        cancel.className = "btn-comment btn-cancel";
        cancel.textContent = "Cancel";
        cancel.addEventListener("click", closeInput);

        const save = document.createElement("button");
        save.type = "button";
        save.className = "btn-comment btn-save";
        save.textContent = "Save";
        save.addEventListener("click", () => {
          const text = ta.value.trim();
          if (!text) { ta.focus(); return; }
          const list = loadComments();
          list.push({
            id: genId(),
            file: file,
            line: line,
            side: side,
            code: code,
            text: text,
            createdAt: Date.now()
          });
          saveComments(list);
          closeInput();
          renderComments();
        });

        actions.appendChild(cancel);
        actions.appendChild(save);
        wrap.appendChild(meta);
        wrap.appendChild(ta);
        wrap.appendChild(actions);
        td.appendChild(wrap);
        tr.appendChild(td);
        originRow.parentNode.insertBefore(tr, originRow.nextSibling);

        ta.addEventListener("keydown", (e) => {
          if (e.key === "Escape") { e.preventDefault(); closeInput(); }
          else if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); save.click(); }
        });
        ta.focus();
        activeInputRow = tr;
      }

      function clearCommentRows() {
        document.querySelectorAll(".comment-row").forEach((tr) => tr.remove());
      }

      function findRow(table, file, line, side) {
        const cells = table.querySelectorAll('td.line-no[data-file][data-line][data-side]');
        for (let i = 0; i < cells.length; i++) {
          const c = cells[i];
          if (c.dataset.file === file && c.dataset.line === line && c.dataset.side === side) {
            return c.parentElement;
          }
        }
        return null;
      }

      function buildThread(file, line, side, group) {
        const wrap = document.createElement("div");
        wrap.className = "comment-thread";
        group.forEach((c) => {
          const item = document.createElement("div");
          item.className = "comment";

          const meta = document.createElement("div");
          meta.className = "comment-meta";
          const when = new Date(c.createdAt);
          meta.textContent = "Line " + line + " (" + side + ") · " + when.toLocaleString();

          const body = document.createElement("div");
          body.className = "comment-body";
          body.textContent = c.text;

          const actions = document.createElement("div");
          actions.className = "comment-actions";
          const del = document.createElement("button");
          del.type = "button";
          del.className = "btn-comment btn-delete";
          del.textContent = "Delete";
          del.addEventListener("click", () => {
            saveComments(loadComments().filter((x) => x.id !== c.id));
            renderComments();
          });
          actions.appendChild(del);

          item.appendChild(meta);
          item.appendChild(body);
          item.appendChild(actions);
          wrap.appendChild(item);
        });
        return wrap;
      }

      function renderComments() {
        clearCommentRows();
        const all = loadComments();
        updateCount(all.length);
        if (!all.length) return;

        document.querySelectorAll("section.file-diff").forEach((section) => {
          const file = getFilePath(section);
          const fileComments = all.filter((c) => c.file === file);
          if (!fileComments.length) return;

          const groups = new Map();
          fileComments.forEach((c) => {
            const key = c.line + ":" + c.side;
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(c);
          });

          [".unified-table", ".split-table"].forEach((sel) => {
            const table = section.querySelector(sel);
            if (!table) return;
            groups.forEach((group, key) => {
              const parts = key.split(":");
              const line = parts[0];
              const side = parts[1];
              const row = findRow(table, file, line, side);
              if (!row) return;
              const tr = document.createElement("tr");
              tr.className = "comment-row";
              const td = document.createElement("td");
              td.colSpan = row.children.length;
              td.appendChild(buildThread(file, parseInt(line, 10), side, group));
              tr.appendChild(td);
              row.parentNode.insertBefore(tr, row.nextSibling);
            });
          });
        });
      }

      function updateCount(n) {
        const el = document.querySelector("[data-comment-count]");
        if (!el) return;
        el.textContent = String(n);
        if (n > 0) el.removeAttribute("hidden");
        else el.setAttribute("hidden", "");
      }

      // Click delegation for + buttons
      document.addEventListener("click", (event) => {
        const btn = event.target.closest(".add-comment-btn");
        if (!btn) return;
        event.preventDefault();
        event.stopPropagation();
        const cell = btn.closest("td.line-no");
        if (!cell) return;
        openInput(
          cell.parentElement,
          cell.dataset.file || "",
          parseInt(cell.dataset.line, 10),
          cell.dataset.side || "new",
          cell.dataset.code || ""
        );
      });

      // Markdown export
      function inferLang(file) {
        const dot = file.lastIndexOf(".");
        if (dot < 0) return "";
        return EXT_LANG[file.slice(dot + 1).toLowerCase()] || "";
      }

      function escapeFence(code) {
        // Bump fence length if code contains backticks
        let max = 0, run = 0;
        for (let i = 0; i < code.length; i++) {
          if (code[i] === "`") { run += 1; if (run > max) max = run; }
          else run = 0;
        }
        return "`".repeat(Math.max(3, max + 1));
      }

      function commentsToMarkdown() {
        const all = loadComments();
        const header =
          "# Code Review Feedback\n\n" +
          "The following review comments reference specific files and line numbers " +
          "in the working-tree diff. Please address each item.\n\n" +
          (repoPath ? "**Repository:** `" + repoPath + "`\n\n" : "") +
          "**Generated:** " + new Date().toISOString() + "\n\n" +
          "---\n\n";

        if (!all.length) {
          return header + "_No review comments recorded yet._\n";
        }

        const byFile = new Map();
        all.forEach((c) => {
          if (!byFile.has(c.file)) byFile.set(c.file, []);
          byFile.get(c.file).push(c);
        });

        const files = Array.from(byFile.keys()).sort();
        let md = header;
        files.forEach((file) => {
          md += "## `" + file + "`\n\n";
          const list = byFile.get(file).slice().sort((a, b) => {
            if (a.line !== b.line) return a.line - b.line;
            return a.createdAt - b.createdAt;
          });
          const lang = inferLang(file);
          list.forEach((c, idx) => {
            md += "### Line " + c.line + " (" + c.side + ")\n\n";
            const fence = escapeFence(c.code || "");
            md += fence + lang + "\n" + (c.code || "") + "\n" + fence + "\n\n";
            md += c.text + "\n\n";
            if (idx < list.length - 1) md += "---\n\n";
          });
        });
        return md;
      }

      function flashCopied(btn) {
        const label = btn.querySelector(".label");
        const orig = label ? label.textContent : "";
        if (label) label.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          if (label) label.textContent = orig;
          btn.classList.remove("copied");
        }, 1500);
      }

      function copyText(text, btn) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => flashCopied(btn), () => fallbackCopy(text, btn));
        } else {
          fallbackCopy(text, btn);
        }
      }

      function fallbackCopy(text, btn) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); } catch (e) { /* ignore */ }
        document.body.removeChild(ta);
        flashCopied(btn);
      }

      const copyBtn = document.querySelector("[data-copy-markdown]");
      if (copyBtn) {
        copyBtn.addEventListener("click", () => copyText(commentsToMarkdown(), copyBtn));
      }

      annotateLines();
      renderComments();
    })();
  </script>
</body>
</html>
