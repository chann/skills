<!DOCTYPE html>
<html lang="en"
      data-diff-view="unified"
      data-page-theme="light"
      data-sidebar-collapsed="false"
      data-code-scheme="github">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__REPORT_TITLE__</title>
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --sidebar-width: 240px;
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface-muted: #f0f2f4;
      --border: #d8dde3;
      --text: #1f2933;
      --muted: #667085;
      --accent: #2563eb;
      --add-bg: #e8f6ee;
      --add-line: #c6ead3;
      --add-text: #116329;
      --del-bg: #fdebec;
      --del-line: #f6c7ca;
      --del-text: #a40e26;
      --hunk-bg: #eef3ff;
      --hunk-text: #3150a8;
      --code-bg: #ffffff;
      --code-fg: #1f2328;
      --code-muted: #8c959f;
      --selection-bg: rgba(37, 99, 235, 0.18);
      --selection-fg: var(--accent);
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
    }

    html[data-page-theme="dark"] {
      --bg: #111318;
      --surface: #181b21;
      --surface-muted: #20242c;
      --border: #323846;
      --text: #e6e9ef;
      --muted: #9aa4b2;
      --accent: #7aa2ff;
      --add-bg: #12321f;
      --add-line: #1e5433;
      --add-text: #8fe3a7;
      --del-bg: #3b151a;
      --del-line: #64252d;
      --del-text: #ffb3ba;
      --hunk-bg: #1d2946;
      --hunk-text: #a9c2ff;
      --code-bg: #0d1117;
      --code-fg: #c9d1d9;
      --code-muted: #6e7681;
      --selection-bg: rgba(122, 162, 255, 0.28);
      --selection-fg: var(--accent);
      --shadow: none;
    }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.45;
    }

    a { color: inherit; text-decoration: none; }

    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      min-height: 100vh;
    }

    html[data-sidebar-collapsed="true"] .layout {
      grid-template-columns: minmax(0, 1fr);
    }

    html[data-sidebar-collapsed="true"] aside { display: none; }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--border);
      background: var(--surface-muted);
      display: flex;
      flex-direction: column;
      overflow: visible;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 3px 6px;
      cursor: pointer;
      min-height: 0;
      font-size: 12px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover { color: var(--text); border-color: var(--muted); }

    .brand {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin: 0;
    }

    .sidebar-body {
      flex: 1 1 auto;
      overflow: auto;
      padding: 6px 8px 10px;
    }

    .repo {
      overflow-wrap: anywhere;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.35;
      padding: 4px 4px 6px;
      border-bottom: 1px dashed var(--border);
      margin-bottom: 6px;
    }

    .nav-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-list a {
      display: block;
      border-radius: 4px;
      color: var(--muted);
      padding: 2px 6px;
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .nav-list a:hover { background: var(--border); color: var(--text); }

    .nav-list a.active {
      background: var(--accent);
      color: #ffffff;
      font-weight: 500;
    }

    .nav-list a.active:hover { background: var(--accent); color: #ffffff; }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 8px 10px;
      flex: 0 0 auto;
    }

    .copy-md-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--accent);
      color: #ffffff;
      border: 0;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      min-height: 0;
    }

    .copy-md-btn:hover { opacity: 0.92; }
    .copy-md-btn.copied { background: var(--add-text); }
    .copy-md-btn .count {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 700;
    }

    .sidebar-resizer {
      position: absolute;
      top: 0;
      right: -3px;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      z-index: 5;
      background: transparent;
    }

    .sidebar-resizer:hover,
    .sidebar-resizer.dragging {
      background: var(--accent);
      opacity: 0.45;
    }

    .sidebar-expand {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 999;
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      color: var(--text);
      font-size: 13px;
      line-height: 1;
      box-shadow: var(--shadow);
    }

    html[data-sidebar-collapsed="true"] .sidebar-expand { display: inline-flex; }
    .sidebar-expand:hover { color: var(--accent); border-color: var(--accent); }

    main {
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.2;
    }

    .meta { color: var(--muted); }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 24px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 112px;
      padding: 10px 12px;
    }

    .metric strong {
      display: block;
      font-size: 19px;
      line-height: 1.1;
    }

    .metric span { color: var(--muted); font-size: 12px; }
    .metric.add strong { color: var(--add-text); }
    .metric.del strong { color: var(--del-text); }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px;
      box-shadow: var(--shadow);
    }

    .control-label {
      color: var(--muted);
      font-size: 12px;
      padding-left: 5px;
    }

    button, select {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      min-height: 28px;
      padding: 4px 8px;
    }

    button[aria-pressed="true"] {
      background: var(--accent);
      color: #ffffff;
    }

    select { border-left: 1px solid var(--border); }

    .file-diff {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      overflow: hidden;
    }

    .file-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
    }

    .file-header h2 {
      margin: 0 0 2px;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .file-header p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .language-badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .diff-view { overflow: auto; }
    html[data-diff-view="unified"] .split-view { display: none; }
    html[data-diff-view="split"] .unified-view { display: none; }

    .diff-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.55;
    }

    .line-col { width: 54px; }
    .divider-col { width: 10px; }

    .line-no {
      background: var(--surface-muted);
      border-right: 1px solid var(--border);
      color: var(--code-muted);
      padding: 0 8px;
      text-align: right;
      user-select: none;
      vertical-align: top;
      position: relative;
      cursor: pointer;
    }

    .line-no:hover { background: var(--border); }

    .line-no.selecting {
      background: var(--selection-bg) !important;
      color: var(--selection-fg) !important;
    }

    .code-line {
      background: var(--code-bg);
      color: var(--code-fg);
      overflow-wrap: anywhere;
      padding: 0 10px;
      white-space: pre-wrap;
      vertical-align: top;
    }

    .code-line code {
      background: transparent;
      color: inherit;
      font-family: inherit;
      padding: 0;
      white-space: pre-wrap;
    }

    .line-sign {
      display: inline-block;
      color: var(--muted);
      user-select: none;
      width: 18px;
    }

    .line-add .line-no { background: var(--add-line); color: var(--add-text); }
    .line-add .code-line { background: var(--add-bg); }
    .line-del .line-no { background: var(--del-line); color: var(--del-text); }
    .line-del .code-line { background: var(--del-bg); }

    .hunk-row td {
      background: var(--hunk-bg);
      color: var(--hunk-text);
      font-weight: 600;
      padding: 5px 10px;
    }

    .split-divider { background: var(--border); padding: 0; }
    .empty { background: var(--surface-muted); }

    .empty-state {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    /* Inline review comments */
    .comment-row > td,
    .comment-input-row > td {
      background: var(--surface-muted);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      white-space: normal;
    }

    .comment-thread { display: flex; flex-direction: column; gap: 8px; }

    .comment {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comment-meta { color: var(--muted); font-size: 11px; }
    .comment-body { white-space: pre-wrap; word-break: break-word; }

    .comment-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .comment-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .comment-input-meta { color: var(--muted); font-size: 11px; }

    .comment-input textarea {
      width: 100%;
      min-height: 64px;
      resize: vertical;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.45;
      box-sizing: border-box;
    }

    .comment-input-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .btn-comment {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-sans);
      line-height: 1.4;
    }

    .btn-comment.btn-save {
      background: var(--accent);
      color: #ffffff;
      border: 1px solid var(--accent);
    }

    .btn-comment.btn-cancel,
    .btn-comment.btn-delete {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-comment.btn-delete:hover { color: var(--del-text); border-color: var(--del-line); }
    .btn-comment.btn-save:hover { opacity: 0.9; }

    body.resizing-sidebar,
    body.selecting-lines {
      user-select: none;
      cursor: col-resize;
    }

    body.selecting-lines { cursor: row-resize; }

    @media (max-width: 860px) {
      .layout { display: block; }
      aside {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--border);
        max-height: 40vh;
      }
      .sidebar-resizer { display: none; }
      main { padding: 18px; }
      .topbar { display: block; }
      .controls { justify-content: flex-start; margin-top: 14px; }
      .diff-table { font-size: 11px; }
      .line-col { width: 42px; }
    }
  </style>
</head>
<body>
  <button class="sidebar-expand" type="button" data-sidebar-expand title="Show sidebar" aria-label="Show sidebar">&#9776;</button>
  <div class="layout">
    <aside data-sidebar>
      <div class="sidebar-header">
        <button class="icon-btn" type="button" data-sidebar-toggle title="Collapse sidebar" aria-label="Collapse sidebar">&#x276E;</button>
        <span class="brand">Diff Viewer</span>
      </div>
      <div class="sidebar-body">
        <div class="repo">__REPO_PATH__</div>
        <nav aria-label="Changed files">
          <ul class="nav-list">
            __FILE_NAV__
          </ul>
        </nav>
      </div>
      <div class="sidebar-footer">
        <button class="copy-md-btn" type="button" data-copy-markdown aria-label="Copy review markdown">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span class="label">Copy Markdown</span>
          <span class="count" data-comment-count hidden>0</span>
        </button>
      </div>
      <div class="sidebar-resizer" data-sidebar-resizer></div>
    </aside>

    <main id="top">
      <div class="topbar">
        <div>
          <h1>__REPORT_TITLE__</h1>
          <div class="meta">Generated __CREATED_AT__</div>
        </div>
        <div class="controls" aria-label="Display controls">
          <div class="control" role="group" aria-label="Diff view">
            <span class="control-label">View</span>
            <button type="button" data-set-view="unified">Unified</button>
            <button type="button" data-set-view="split">Split</button>
          </div>
          <label class="control">
            <span class="control-label">Theme</span>
            <select data-theme-select>
              <option value="auto">Auto</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
          <label class="control">
            <span class="control-label">Code</span>
            <select data-code-scheme-select>
              <option value="github">GitHub</option>
              <option value="ayu">Ayu</option>
              <option value="one">One</option>
              <option value="flexoki">Flexoki</option>
              <option value="dracula">Dracula</option>
              <option value="monokai">Monokai</option>
              <option value="sublime">Sublime</option>
              <option value="terminal">Terminal</option>
            </select>
          </label>
        </div>
      </div>

      <div class="summary" aria-label="Diff summary">
        <div class="metric"><strong>__SUMMARY_FILES__</strong><span>files changed</span></div>
        <div class="metric add"><strong>+__SUMMARY_ADDITIONS__</strong><span>additions</span></div>
        <div class="metric del"><strong>-__SUMMARY_DELETIONS__</strong><span>deletions</span></div>
      </div>

      __REPORT_BODY__
    </main>
  </div>

  <script id="highlight-seeds" type="application/json">__HIGHLIGHT_SEEDS__</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script>
    const defaults = {
      view: __DEFAULT_VIEW__,
      theme: __DEFAULT_THEME__,
      codeScheme: __DEFAULT_CODE_SCHEME__
    };

    const HLJS_BASE = "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/";
    const CODE_SCHEMES = {
      github:   { light: "github.min.css",              dark: "github-dark.min.css" },
      ayu:      { light: "stackoverflow-light.min.css", dark: "atom-one-dark-reasonable.min.css" },
      one:      { light: "atom-one-light.min.css",      dark: "atom-one-dark.min.css" },
      flexoki:  { light: "kimbie-light.min.css",        dark: "kimbie-dark.min.css" },
      dracula:  { light: "stackoverflow-light.min.css", dark: "dracula.min.css" },
      monokai:  { light: "vs.min.css",                  dark: "monokai.min.css" },
      sublime:  { light: "default.min.css",             dark: "monokai-sublime.min.css" },
      terminal: { light: "nnfx-light.min.css",          dark: "nnfx-dark.min.css" }
    };

    const media = window.matchMedia("(prefers-color-scheme: dark)");

    function preferred(value) {
      return value === "auto" ? (media.matches ? "dark" : "light") : value;
    }

    function applyHljsTheme() {
      const pageTheme = document.documentElement.dataset.pageTheme || "light";
      const schemeName = document.documentElement.dataset.codeScheme || "github";
      const variants = CODE_SCHEMES[schemeName] || CODE_SCHEMES.github;
      const filename = variants[pageTheme] || variants.light;
      const link = document.getElementById("hljs-theme");
      if (link) link.href = HLJS_BASE + filename;
    }

    function setView(view) {
      document.documentElement.dataset.diffView = view;
      localStorage.setItem("diff-viewer:view", view);
      document.querySelectorAll("[data-set-view]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.setView === view));
      });
    }

    function setTheme(value) {
      document.documentElement.dataset.pageTheme = preferred(value);
      localStorage.setItem("diff-viewer:theme", value);
      const sel = document.querySelector("[data-theme-select]");
      if (sel) sel.value = value;
      applyHljsTheme();
    }

    function setCodeScheme(value) {
      const scheme = CODE_SCHEMES[value] ? value : "github";
      document.documentElement.dataset.codeScheme = scheme;
      localStorage.setItem("diff-viewer:code-scheme", scheme);
      const sel = document.querySelector("[data-code-scheme-select]");
      if (sel) sel.value = scheme;
      applyHljsTheme();
    }

    document.querySelectorAll("[data-set-view]").forEach((button) => {
      button.addEventListener("click", () => setView(button.dataset.setView));
    });
    document.querySelector("[data-theme-select]").addEventListener("change", (event) => {
      setTheme(event.target.value);
    });
    document.querySelector("[data-code-scheme-select]").addEventListener("change", (event) => {
      setCodeScheme(event.target.value);
    });
    media.addEventListener("change", () => {
      setTheme(localStorage.getItem("diff-viewer:theme") || defaults.theme);
    });

    setView(localStorage.getItem("diff-viewer:view") || defaults.view);
    setTheme(localStorage.getItem("diff-viewer:theme") || defaults.theme);
    setCodeScheme(localStorage.getItem("diff-viewer:code-scheme") || defaults.codeScheme);

    // Sidebar collapse / expand / resize
    (function () {
      const aside = document.querySelector("aside[data-sidebar]");
      const resizer = document.querySelector("[data-sidebar-resizer]");
      const toggle = document.querySelector("[data-sidebar-toggle]");
      const expand = document.querySelector("[data-sidebar-expand]");
      const MIN_WIDTH = 100;
      const DEFAULT_WIDTH = 240;
      const COLLAPSE_THRESHOLD = 110;

      function setWidth(px) {
        const clamped = Math.max(MIN_WIDTH, Math.min(px, Math.floor(window.innerWidth * 0.6)));
        document.documentElement.style.setProperty("--sidebar-width", clamped + "px");
        localStorage.setItem("diff-viewer:sidebar:width", String(clamped));
      }

      function setCollapsed(collapsed) {
        document.documentElement.dataset.sidebarCollapsed = String(Boolean(collapsed));
        localStorage.setItem("diff-viewer:sidebar:collapsed", String(Boolean(collapsed)));
      }

      const storedWidth = parseInt(localStorage.getItem("diff-viewer:sidebar:width") || String(DEFAULT_WIDTH), 10);
      if (Number.isFinite(storedWidth)) {
        document.documentElement.style.setProperty(
          "--sidebar-width",
          Math.max(MIN_WIDTH, Math.min(storedWidth, Math.floor(window.innerWidth * 0.6))) + "px"
        );
      }
      setCollapsed(localStorage.getItem("diff-viewer:sidebar:collapsed") === "true");

      if (toggle) toggle.addEventListener("click", () => setCollapsed(true));
      if (expand) expand.addEventListener("click", () => setCollapsed(false));

      if (resizer && aside) {
        let dragging = false;
        resizer.addEventListener("mousedown", (event) => {
          if (event.button !== 0) return;
          event.preventDefault();
          dragging = true;
          resizer.classList.add("dragging");
          document.body.classList.add("resizing-sidebar");
        });
        window.addEventListener("mousemove", (event) => {
          if (!dragging) return;
          const rect = aside.getBoundingClientRect();
          const width = event.clientX - rect.left;
          if (width < COLLAPSE_THRESHOLD) {
            setCollapsed(true);
            dragging = false;
            resizer.classList.remove("dragging");
            document.body.classList.remove("resizing-sidebar");
            return;
          }
          setWidth(width);
        });
        window.addEventListener("mouseup", () => {
          if (!dragging) return;
          dragging = false;
          resizer.classList.remove("dragging");
          document.body.classList.remove("resizing-sidebar");
        });
      }
    })();

    function splitHighlightedHtml(markup) {
      const lines = [""];
      const openTags = [];
      let index = 0;

      while (index < markup.length) {
        if (markup.startsWith("<span ", index)) {
          const end = markup.indexOf(">", index);
          const tag = markup.slice(index, end + 1);
          lines[lines.length - 1] += tag;
          openTags.push(tag);
          index = end + 1;
        } else if (markup.startsWith("</span>", index)) {
          lines[lines.length - 1] += "</span>";
          openTags.pop();
          index += 7;
        } else if (markup[index] === "\n") {
          for (let i = openTags.length - 1; i >= 0; i -= 1) {
            lines[lines.length - 1] += "</span>";
          }
          lines.push(openTags.join(""));
          index += 1;
        } else {
          lines[lines.length - 1] += markup[index];
          index += 1;
        }
      }

      return lines;
    }

    function highlightedLines(text, language) {
      if (!window.hljs) return text.split("\n").map((line) => line || "&nbsp;");
      const highlighted = language && hljs.getLanguage(language)
        ? hljs.highlight(text, { language, ignoreIllegals: true }).value
        : hljs.highlightAuto(text).value;
      return splitHighlightedHtml(highlighted);
    }

    const seedElement = document.getElementById("highlight-seeds");
    if (seedElement) {
      const files = new Map();
      JSON.parse(seedElement.textContent || "[]").forEach((seed) => {
        files.set(String(seed.file), {
          before: highlightedLines(seed.before || "", seed.lang),
          after: highlightedLines(seed.after || "", seed.lang)
        });
      });

      document.querySelectorAll("[data-highlight-file]").forEach((node) => {
        const file = files.get(node.dataset.highlightFile);
        if (!file) return;
        const side = file[node.dataset.highlightSide];
        const line = side && side[Number(node.dataset.highlightLine)];
        if (line !== undefined) node.innerHTML = line || "&nbsp;";
      });
    }

    // File nav scroll spy — highlight the file currently in view
    (function () {
      const sections = Array.from(document.querySelectorAll("section.file-diff"));
      const links = Array.from(document.querySelectorAll(".nav-list a[href^='#']"));
      if (!sections.length || !links.length) return;

      const linkByAnchor = new Map();
      links.forEach((link) => {
        const id = link.getAttribute("href").slice(1);
        if (id) linkByAnchor.set(id, link);
      });

      const aside = document.querySelector("aside");
      const offset = 96; // px below viewport top considered "current"
      let activeLink = null;

      function ensureVisible(link) {
        if (!aside) return;
        const r = link.getBoundingClientRect();
        const ar = aside.getBoundingClientRect();
        if (r.top < ar.top || r.bottom > ar.bottom) {
          link.scrollIntoView({ block: "nearest" });
        }
      }

      function updateActive() {
        let current = sections[0];
        for (let i = 0; i < sections.length; i++) {
          if (sections[i].getBoundingClientRect().top - offset <= 0) {
            current = sections[i];
          } else {
            break;
          }
        }
        const link = linkByAnchor.get(current.id);
        if (link === activeLink) return;
        if (activeLink) activeLink.classList.remove("active");
        if (link) {
          link.classList.add("active");
          ensureVisible(link);
        }
        activeLink = link || null;
      }

      window.addEventListener("scroll", updateActive, { passive: true });
      window.addEventListener("resize", updateActive);
      updateActive();
    })();

    // Inline review comments — drag line numbers to select a range, then leave a comment
    (function () {
      const repoEl = document.querySelector(".repo");
      const repoPath = repoEl ? repoEl.textContent.trim() : "";
      const STORAGE_KEY = "diff-viewer:comments:" + (repoPath || "default");

      const EXT_LANG = {
        js: "js", mjs: "js", cjs: "js", jsx: "jsx",
        ts: "ts", tsx: "tsx", py: "python", go: "go",
        rs: "rust", java: "java", kt: "kotlin", rb: "ruby",
        php: "php", c: "c", h: "c", cpp: "cpp", cc: "cpp",
        cs: "csharp", swift: "swift", scala: "scala",
        sh: "bash", bash: "bash", zsh: "bash",
        html: "html", htm: "html", xml: "xml",
        css: "css", scss: "scss", less: "less",
        json: "json", jsonc: "json", yaml: "yaml", yml: "yaml",
        toml: "toml", md: "markdown", sql: "sql", lua: "lua",
        vue: "vue", svelte: "svelte"
      };

      function loadComments() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed.map(normalizeComment);
        } catch (e) { return []; }
      }

      function normalizeComment(c) {
        // Backward compatible with the old single-line entry format
        const obj = Object.assign({}, c);
        if (obj.startLine == null) obj.startLine = obj.line;
        if (obj.endLine == null) obj.endLine = obj.line;
        obj.startLine = parseInt(obj.startLine, 10);
        obj.endLine = parseInt(obj.endLine, 10);
        return obj;
      }

      function saveComments(list) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
        catch (e) { /* ignore quota errors */ }
      }

      function genId() {
        return "c-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
      }

      function getFilePath(section) {
        const h2 = section.querySelector(".file-header h2");
        if (!h2) return "";
        const txt = h2.textContent.trim();
        const m = txt.match(/^(.+?)\s*->\s*(.+)$/);
        return m ? m[2].trim() : txt;
      }

      function readCellCode(cell) {
        if (!cell) return "";
        const codeEl = cell.querySelector("code");
        return (codeEl ? codeEl.textContent : cell.textContent) || "";
      }

      function annotateCell(cell, file, side, codeCell) {
        if (!cell.classList.contains("line-no")) return;
        const text = (cell.textContent || "").trim();
        if (!text) return;
        const lineNum = parseInt(text, 10);
        if (!Number.isFinite(lineNum)) return;
        cell.dataset.file = file;
        cell.dataset.line = String(lineNum);
        cell.dataset.side = side;
        cell.dataset.code = readCellCode(codeCell);
      }

      function annotateLines() {
        document.querySelectorAll("section.file-diff").forEach((section) => {
          const file = getFilePath(section);
          section.querySelectorAll(".unified-table > tbody > tr").forEach((tr) => {
            if (tr.classList.contains("hunk-row")) return;
            const cells = tr.children;
            if (cells.length < 3) return;
            annotateCell(cells[0], file, "old", cells[2]);
            annotateCell(cells[1], file, "new", cells[2]);
          });
          section.querySelectorAll(".split-table > tbody > tr").forEach((tr) => {
            if (tr.classList.contains("hunk-row")) return;
            const cells = tr.children;
            if (cells.length < 5) return;
            annotateCell(cells[0], file, "old", cells[1]);
            annotateCell(cells[3], file, "new", cells[4]);
          });
        });
      }

      let activeInputRow = null;

      function closeInput() {
        if (activeInputRow) { activeInputRow.remove(); activeInputRow = null; }
      }

      function activeTableSel() {
        return (document.documentElement.dataset.diffView || "unified") === "split"
          ? ".split-table"
          : ".unified-table";
      }

      function selectCellsInRange(file, side, lo, hi) {
        const cells = document.querySelectorAll(
          activeTableSel() + " td.line-no[data-file][data-line][data-side]"
        );
        const result = [];
        cells.forEach((c) => {
          if (c.dataset.file !== file || c.dataset.side !== side) return;
          const n = parseInt(c.dataset.line, 10);
          if (n >= lo && n <= hi) result.push({ n: n, cell: c });
        });
        result.sort((a, b) => a.n - b.n);
        return result;
      }

      function clearSelectionStyle() {
        document.querySelectorAll(".line-no.selecting").forEach((c) => c.classList.remove("selecting"));
      }

      function paintSelection(file, side, lo, hi) {
        clearSelectionStyle();
        selectCellsInRange(file, side, lo, hi).forEach((entry) => entry.cell.classList.add("selecting"));
      }

      function collectRangeCode(file, side, lo, hi) {
        return selectCellsInRange(file, side, lo, hi)
          .map((entry) => entry.cell.dataset.code || "")
          .join("\n");
      }

      let drag = null;
      const SUPPRESS_CLOSEST = ".comment-input, .comment, .comment-thread, .sidebar-resizer, button, select, textarea, input, a";

      document.addEventListener("mousedown", (event) => {
        if (event.button !== 0) return;
        if (event.target.closest(SUPPRESS_CLOSEST)) return;
        const cell = event.target.closest("td.line-no");
        if (!cell || !cell.dataset.line) return;
        event.preventDefault();
        drag = {
          file: cell.dataset.file,
          side: cell.dataset.side,
          startLine: parseInt(cell.dataset.line, 10),
          endLine: parseInt(cell.dataset.line, 10),
          originRow: cell.parentElement
        };
        document.body.classList.add("selecting-lines");
        paintSelection(drag.file, drag.side, drag.startLine, drag.endLine);
      });

      document.addEventListener("mousemove", (event) => {
        if (!drag) return;
        const cell = event.target.closest("td.line-no");
        if (!cell || !cell.dataset.line) return;
        if (cell.dataset.file !== drag.file || cell.dataset.side !== drag.side) return;
        drag.endLine = parseInt(cell.dataset.line, 10);
        const lo = Math.min(drag.startLine, drag.endLine);
        const hi = Math.max(drag.startLine, drag.endLine);
        paintSelection(drag.file, drag.side, lo, hi);
      });

      document.addEventListener("mouseup", () => {
        if (!drag) return;
        const lo = Math.min(drag.startLine, drag.endLine);
        const hi = Math.max(drag.startLine, drag.endLine);
        const file = drag.file;
        const side = drag.side;
        drag = null;
        document.body.classList.remove("selecting-lines");
        clearSelectionStyle();
        const range = selectCellsInRange(file, side, lo, hi);
        if (!range.length) return;
        const anchorRow = range[range.length - 1].cell.parentElement;
        const code = range.map((entry) => entry.cell.dataset.code || "").join("\n");
        openInput(anchorRow, file, lo, hi, side, code);
      });

      function openInput(originRow, file, startLine, endLine, side, code) {
        closeInput();
        const tr = document.createElement("tr");
        tr.className = "comment-input-row";
        const td = document.createElement("td");
        td.colSpan = originRow.children.length;

        const wrap = document.createElement("div");
        wrap.className = "comment-input";

        const meta = document.createElement("div");
        meta.className = "comment-input-meta";
        const range = startLine === endLine ? "Line " + startLine : "Lines " + startLine + "-" + endLine;
        meta.textContent = file + " · " + range + " (" + side + ")";

        const ta = document.createElement("textarea");
        ta.placeholder = "Write a review comment…";

        const actions = document.createElement("div");
        actions.className = "comment-input-actions";

        const cancel = document.createElement("button");
        cancel.type = "button";
        cancel.className = "btn-comment btn-cancel";
        cancel.textContent = "Cancel";
        cancel.addEventListener("click", closeInput);

        const save = document.createElement("button");
        save.type = "button";
        save.className = "btn-comment btn-save";
        save.textContent = "Save";
        save.addEventListener("click", () => {
          const text = ta.value.trim();
          if (!text) { ta.focus(); return; }
          const list = loadComments();
          list.push({
            id: genId(),
            file: file,
            startLine: startLine,
            endLine: endLine,
            side: side,
            code: code,
            text: text,
            createdAt: Date.now()
          });
          saveComments(list);
          closeInput();
          renderComments();
        });

        actions.appendChild(cancel);
        actions.appendChild(save);
        wrap.appendChild(meta);
        wrap.appendChild(ta);
        wrap.appendChild(actions);
        td.appendChild(wrap);
        tr.appendChild(td);
        originRow.parentNode.insertBefore(tr, originRow.nextSibling);

        ta.addEventListener("keydown", (e) => {
          if (e.key === "Escape") { e.preventDefault(); closeInput(); }
          else if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); save.click(); }
        });
        ta.focus();
        activeInputRow = tr;
      }

      function clearCommentRows() {
        document.querySelectorAll(".comment-row").forEach((tr) => tr.remove());
      }

      function findRow(table, file, line, side) {
        const cells = table.querySelectorAll('td.line-no[data-file][data-line][data-side]');
        for (let i = 0; i < cells.length; i++) {
          const c = cells[i];
          if (c.dataset.file === file && c.dataset.line === String(line) && c.dataset.side === side) {
            return c.parentElement;
          }
        }
        return null;
      }

      function buildThread(file, startLine, endLine, side, group) {
        const wrap = document.createElement("div");
        wrap.className = "comment-thread";
        const rangeLabel = startLine === endLine ? "Line " + startLine : "Lines " + startLine + "-" + endLine;
        group.forEach((c) => {
          const item = document.createElement("div");
          item.className = "comment";

          const meta = document.createElement("div");
          meta.className = "comment-meta";
          const when = new Date(c.createdAt);
          meta.textContent = rangeLabel + " (" + side + ") · " + when.toLocaleString();

          const body = document.createElement("div");
          body.className = "comment-body";
          body.textContent = c.text;

          const actions = document.createElement("div");
          actions.className = "comment-actions";
          const del = document.createElement("button");
          del.type = "button";
          del.className = "btn-comment btn-delete";
          del.textContent = "Delete";
          del.addEventListener("click", () => {
            saveComments(loadComments().filter((x) => x.id !== c.id));
            renderComments();
          });
          actions.appendChild(del);

          item.appendChild(meta);
          item.appendChild(body);
          item.appendChild(actions);
          wrap.appendChild(item);
        });
        return wrap;
      }

      function renderComments() {
        clearCommentRows();
        const all = loadComments();
        updateCount(all.length);
        if (!all.length) return;

        document.querySelectorAll("section.file-diff").forEach((section) => {
          const file = getFilePath(section);
          const fileComments = all.filter((c) => c.file === file);
          if (!fileComments.length) return;

          const groups = new Map();
          fileComments.forEach((c) => {
            const key = c.startLine + ":" + c.endLine + ":" + c.side;
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(c);
          });

          [".unified-table", ".split-table"].forEach((sel) => {
            const table = section.querySelector(sel);
            if (!table) return;
            groups.forEach((group, key) => {
              const parts = key.split(":");
              const startLine = parseInt(parts[0], 10);
              const endLine = parseInt(parts[1], 10);
              const side = parts[2];
              const row = findRow(table, file, endLine, side);
              if (!row) return;
              const tr = document.createElement("tr");
              tr.className = "comment-row";
              const td = document.createElement("td");
              td.colSpan = row.children.length;
              td.appendChild(buildThread(file, startLine, endLine, side, group));
              tr.appendChild(td);
              row.parentNode.insertBefore(tr, row.nextSibling);
            });
          });
        });
      }

      function updateCount(n) {
        const el = document.querySelector("[data-comment-count]");
        if (!el) return;
        el.textContent = String(n);
        if (n > 0) el.removeAttribute("hidden");
        else el.setAttribute("hidden", "");
      }

      // Markdown export
      function inferLang(file) {
        const dot = file.lastIndexOf(".");
        if (dot < 0) return "";
        return EXT_LANG[file.slice(dot + 1).toLowerCase()] || "";
      }

      function escapeFence(code) {
        let max = 0, run = 0;
        for (let i = 0; i < code.length; i++) {
          if (code[i] === "`") { run += 1; if (run > max) max = run; }
          else run = 0;
        }
        return "`".repeat(Math.max(3, max + 1));
      }

      function commentsToMarkdown() {
        const all = loadComments();
        const header =
          "# Code Review Feedback\n\n" +
          "The following review comments reference specific files and line numbers " +
          "in the working-tree diff. Please address each item.\n\n" +
          (repoPath ? "**Repository:** `" + repoPath + "`\n\n" : "") +
          "**Generated:** " + new Date().toISOString() + "\n\n" +
          "---\n\n";

        if (!all.length) {
          return header + "_No review comments recorded yet._\n";
        }

        const byFile = new Map();
        all.forEach((c) => {
          if (!byFile.has(c.file)) byFile.set(c.file, []);
          byFile.get(c.file).push(c);
        });

        const files = Array.from(byFile.keys()).sort();
        let md = header;
        files.forEach((file) => {
          md += "## `" + file + "`\n\n";
          const list = byFile.get(file).slice().sort((a, b) => {
            if (a.startLine !== b.startLine) return a.startLine - b.startLine;
            if (a.endLine !== b.endLine) return a.endLine - b.endLine;
            return a.createdAt - b.createdAt;
          });
          const lang = inferLang(file);
          list.forEach((c, idx) => {
            const range = c.startLine === c.endLine ? "Line " + c.startLine : "Lines " + c.startLine + "-" + c.endLine;
            md += "### " + range + " (" + c.side + ")\n\n";
            const fence = escapeFence(c.code || "");
            md += fence + lang + "\n" + (c.code || "") + "\n" + fence + "\n\n";
            md += c.text + "\n\n";
            if (idx < list.length - 1) md += "---\n\n";
          });
        });
        return md;
      }

      function flashCopied(btn) {
        const label = btn.querySelector(".label");
        const orig = label ? label.textContent : "";
        if (label) label.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          if (label) label.textContent = orig;
          btn.classList.remove("copied");
        }, 1500);
      }

      function copyText(text, btn) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => flashCopied(btn), () => fallbackCopy(text, btn));
        } else {
          fallbackCopy(text, btn);
        }
      }

      function fallbackCopy(text, btn) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); } catch (e) { /* ignore */ }
        document.body.removeChild(ta);
        flashCopied(btn);
      }

      const copyBtn = document.querySelector("[data-copy-markdown]");
      if (copyBtn) {
        copyBtn.addEventListener("click", () => copyText(commentsToMarkdown(), copyBtn));
      }

      annotateLines();
      renderComments();
    })();
  </script>
</body>
</html>
